name: Sports Calendar Engine

on:
  workflow_dispatch:

  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"

concurrency:
  group: sports-calendar-engine
  cancel-in-progress: true

jobs:
  build:

    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Calendars
        run: |
          set -e
          python main.py

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish Updated Calendars
        run: |
          set -e

          git add docs/*.ics

          if git diff --cached --quiet; then
            echo "No calendar changes."
            exit 0
          fi

          echo "Rebasing onto latest main..."
          git pull --rebase origin main

          git commit -m "Publish latest sports calendars"

          echo "Pushing calendars..."

          if ! git push; then
            echo "Push failed. Rebasing and retrying once..."

            git pull --rebase origin main
            git push
          fi